name: Build and push to ECR

on:
  push:
    branches: ["main"]
permissions:
  id-token: write
  contents: read

jobs:
  build_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          severity: "HIGH,CRITICAL"
          #exit-code: "1"
          exit-code: "1"

      - name: Build Docker image
        run: docker build -t 600627356450.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 600627356450.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest
          format: "table"
          #exit-code: "1"
          exit-code: "0"
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::600627356450:role/github-action-role
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Push image to ECR
        run: docker push 600627356450.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest
      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: task-def.json
          service: my-app-service
          cluster: my-app-cluster
          wait-for-service-stability: true  
